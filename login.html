<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Your Ecom Site</title>
    <link rel="icon" href="assets/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', sans-serif;
            /* background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); */

            background: linear-gradient(135deg, #25ac74 0%, #088178 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
        }

        h2 {
            text-align: center;
            margin-bottom: 1.5rem;
            /* color: #333; */
            color: #004539;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #555;
            font-weight: 700;
        }

        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
            transition: border 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #007bff;
        }

        .error {
            color: #e74c3c;
            font-size: 0.9rem;
            margin-top: 0.25rem;
            display: none;
        }

        button {
            width: 100%;
            padding: 0.75rem;
            /* background: #007bff; */
            background-color: #004539;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            /* background: #0056b3; */
            background: #25ac74;
        }

        .back-link {
            text-align: center;
            margin-top: 1rem;
        }

        .back-link a {
            /* color: #007bff; */
            color: #25ac74;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <h2><i class="fas fa-user-lock"></i> Login</h2>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" required minlength="3">
                <div class="error" id="usernameError">Username must be at least 3 characters</div>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required minlength="6">
                <div class="error" id="passwordError">Password must be at least 6 characters</div>
            </div>
            <button type="submit">Login</button>
        </form>
        <div class="back-link"><a href="Index.html">← Back to Home</a></div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            // Reset errors
            document.querySelectorAll('.error').forEach(el => el.style.display = 'none');

            let valid = true;
            if (username.length < 3) {
                document.getElementById('usernameError').style.display = 'block';
                valid = false;
            }
            if (password.length < 6) {
                document.getElementById('passwordError').style.display = 'block';
                valid = false;
            }

            // if (valid) {
            //     localStorage.setItem('loggedInUser', username);
            //     alert(`Welcome, ${username}!`);
            //     window.location.href = 'Index.html','Categories.html','Products.html','Shop.html','Blog.html','About.html','Cart.html'; // Redirect to homepage
            // }

            // Inside your login form "if (valid)" block:
            if (valid) {
                localStorage.setItem('username', username); // Save the name
                localStorage.setItem('isLoggedIn', 'true'); // Save the state
                window.location.href = 'Index.html';
            }

        });
    </script>


</body>

</html>
